name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Syntax check server + GAS bridge
        run: |
          node --check server/index.js
          node --check scripts/google-apps-script.js
      - name: Build single-file demo from src/
        run: npm run build
      - name: Run tests (HTML-escape XSS regression)
        run: npm test
